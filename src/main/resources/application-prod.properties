# Database configuration (In-Memory H2 for cloud/demo deployment)
spring.datasource.url=jdbc:h2:mem:hospital_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA / Hibernate settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Enable H2 Console at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Server port — Render sets PORT env var
server.port=${PORT:8080}

# Logging level
logging.level.org.hibernate.SQL=ERROR
logging.level.org.springframework.web=INFO
